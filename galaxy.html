<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Galaxy Photos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      overscroll-behavior: none;
      font-family: "Georgia", serif;
      cursor: grab;
      user-select: none;
      touch-action: none;
    }

    body.grabbing { cursor: grabbing; }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      touch-action: none;
    }

    /* UI Controls */
    #ui {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 100;
      align-items: center;
    }

    .ctrl-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(180, 100, 255, 0.4);
      color: #d0aaff;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
      backdrop-filter: blur(10px);
    }

    .ctrl-btn:hover {
      background: rgba(180, 100, 255, 0.2);
      transform: scale(1.1);
    }

    .ctrl-btn:active { transform: scale(0.95); }

    #add-photo-btn {
      padding: 0 22px;
      border-radius: 22px;
      width: auto;
      font-size: 13px;
      letter-spacing: 0.08em;
      gap: 6px;
    }

    /* Photo modal lightbox */
    #lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      backdrop-filter: blur(12px);
      animation: fadeIn 0.25s ease;
    }

    #lightbox.open { display: flex; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    #lightbox-inner {
      position: relative;
      max-width: 90vw;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    #lightbox-img {
      max-width: 80vw;
      max-height: 70vh;
      border-radius: 4px;
      box-shadow: 0 0 60px rgba(180, 100, 255, 0.5);
      object-fit: contain;
    }

    #lightbox-caption {
      color: #d0aaff;
      font-size: 14px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    #lightbox-close {
      position: absolute;
      top: -36px;
      right: 0;
      background: none;
      border: none;
      color: #888;
      font-size: 26px;
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s;
    }

    #lightbox-close:hover { color: #fff; }

    /* Add photo panel */
    #add-panel {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10, 5, 20, 0.92);
      border: 1px solid rgba(180, 100, 255, 0.3);
      border-radius: 16px;
      padding: 20px 24px;
      display: none;
      flex-direction: column;
      gap: 12px;
      z-index: 150;
      width: 300px;
      backdrop-filter: blur(20px);
    }

    #add-panel.open { display: flex; }

    #add-panel label {
      color: #c0aadd;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    #add-panel input[type="text"] {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(180, 100, 255, 0.25);
      border-radius: 8px;
      padding: 8px 12px;
      color: #fff;
      font-size: 13px;
      outline: none;
      width: 100%;
    }

    #add-panel input[type="file"] { display: none; }

    .file-label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px;
      border: 1.5px dashed rgba(180, 100, 255, 0.35);
      border-radius: 8px;
      color: #a080cc;
      font-size: 12px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .file-label:hover {
      border-color: rgba(180, 100, 255, 0.7);
      background: rgba(180, 100, 255, 0.07);
    }

    #preview-thumb {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 6px;
      display: none;
      margin: 0 auto;
      border: 1px solid rgba(180, 100, 255, 0.4);
    }

    #add-error {
      min-height: 16px;
      color: #ff9fbf;
      font-size: 11px;
      text-align: center;
    }

    .add-submit {
      padding: 10px;
      background: rgba(160, 80, 255, 0.25);
      border: 1px solid rgba(180, 100, 255, 0.5);
      border-radius: 8px;
      color: #d0aaff;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .add-submit:hover { background: rgba(160, 80, 255, 0.45); }

    .add-submit:disabled {
      opacity: 0.7;
      cursor: wait;
    }

    /* Top hint */
    #hint {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(180, 120, 255, 0.5);
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      pointer-events: none;
      text-align: center;
    }
  </style>
</head>
<body>

<canvas id="c"></canvas>

<div id="hint">Drag to rotate &nbsp;&middot;&nbsp; Scroll to zoom &nbsp;&middot;&nbsp; Click photo to open</div>

<div id="ui">
  <button class="ctrl-btn" id="zoom-out" title="Zoom out">−</button>
  <button class="ctrl-btn" id="zoom-in" title="Zoom in">+</button>
  <button class="ctrl-btn add-photo-btn" id="add-photo-btn" title="Add photo">
    <span>+</span><span style="font-size:12px">Add Photo</span>
  </button>
  <button class="ctrl-btn" id="reset-btn" title="Reset view">↻</button>
</div>

<div id="add-panel">
  <label>Add a Memory</label>
  <label for="file-input" class="file-label">Choose Image</label>
  <input type="file" id="file-input" accept="image/*"/>
  <img id="preview-thumb" src="" alt="preview"/>
  <div id="add-error"></div>
  <input type="text" id="caption-input" placeholder="Caption (optional)..."/>
  <button class="add-submit" id="do-add">Launch into Galaxy ✦</button>
</div>

<div id="lightbox">
  <div id="lightbox-inner">
    <button id="lightbox-close">×</button>
    <img id="lightbox-img" src="" alt=""/>
    <div id="lightbox-caption"></div>
  </div>
</div>

<script>
// ===============================================
// GALAXY PHOTO UNIVERSE - Pure Three.js
// ===============================================

// Minimal Three.js via CDN import
const THREEJS_CDN = "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js";

function loadScript(src) {
  return new Promise((res, rej) => {
    const s = document.createElement("script");
    s.src = src;
    s.onload = res;
    s.onerror = rej;
    document.head.appendChild(s);
  });
}

loadScript(THREEJS_CDN).then(init);

// Sample placeholder photos
// Replace / extend with real URLs or base64 after loading
const SAMPLE_PHOTOS = Array.from({ length: 24 }, (_, index) => ({
  src: null,
  caption: `Memory ${index + 1}`,
}));

const PLACEHOLDER_COLORS = [
  "#c084fc", "#f472b6", "#818cf8", "#34d399",
  "#fb923c", "#38bdf8", "#a78bfa", "#f9a8d4"
];

function makePlaceholderCanvas(color, label) {
  const c = document.createElement("canvas");
  c.width = 256;
  c.height = 256;
  const ctx = c.getContext("2d");

  const g = ctx.createLinearGradient(0, 0, 256, 256);
  g.addColorStop(0, `${color}aa`);
  g.addColorStop(1, "#1a0a2e");
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, 256, 256);

  ctx.strokeStyle = color;
  ctx.lineWidth = 6;
  ctx.strokeRect(4, 4, 248, 248);

  ctx.fillStyle = "#ffffffcc";
  ctx.font = "bold 22px Georgia";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(label, 128, 128);
  return c;
}

// State
let scene, camera, renderer, raycaster, mouse;
let particles, photoMeshes = [];
let isDragging = false;
let prevMouse = { x: 0, y: 0 };
let rotX = 0.3;
let rotY = 0;
let targetRotX = 0.3;
let targetRotY = 0;
let zoom = 1;
let targetZoom = 1;
let photos = [...SAMPLE_PHOTOS];
let pendingUploadFile = null;
const MIN_ZOOM = 0.55;
const MAX_ZOOM = 3;

function init() {
  const canvas = document.getElementById("c");
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x020008);
  scene.fog = new THREE.FogExp2(0x020008, 0.0015);

  camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 3000);
  camera.position.set(0, 0, 500);

  raycaster = new THREE.Raycaster();
  mouse = new THREE.Vector2(-9999, -9999);

  buildParticles();
  buildGlowSphere();
  buildPhotoCards();
  addLights();
  animate();
  bindEvents();
  loadStoredPhotos();
}

function resetAddPanel({ keepCaption = false } = {}) {
  const fileInput = document.getElementById("file-input");
  const previewThumb = document.getElementById("preview-thumb");
  const errorBox = document.getElementById("add-error");
  const captionInput = document.getElementById("caption-input");

  pendingUploadFile = null;
  fileInput.value = "";
  previewThumb.src = "";
  previewThumb.style.display = "none";
  previewThumb.dataset.src = "";
  errorBox.textContent = "";

  if (!keepCaption) {
    captionInput.value = "";
  }
}

function clampZoom(nextZoom) {
  return Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, nextZoom));
}

function clearPhotoCards() {
  photoMeshes.forEach((mesh) => {
    scene.remove(mesh);
    mesh.geometry.dispose();

    if (mesh.material.map) {
      mesh.material.map.dispose();
    }

    mesh.material.dispose();
  });

  photoMeshes = [];
}

function renderPhotos(nextPhotos) {
  photos = nextPhotos.length ? nextPhotos : [...SAMPLE_PHOTOS];
  clearPhotoCards();
  buildPhotoCards();
}

async function loadStoredPhotos() {
  try {
    const response = await fetch("/api/photos");
    if (!response.ok) {
      throw new Error("Request daftar foto gagal.");
    }

    const data = await response.json();
    renderPhotos(Array.isArray(data.photos) ? data.photos : []);
  } catch (error) {
    console.error(error);
  }
}

// Particle field
function buildParticles() {
  const count = 18000;
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  const col = new Float32Array(count * 3);

  for (let i = 0; i < count; i++) {
    const r = Math.random() * 900 + 50;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    pos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
    pos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta) * 0.45;
    pos[i * 3 + 2] = r * Math.cos(phi);

    const t = Math.random();
    if (t > 0.97) {
      col[i * 3] = 1;
      col[i * 3 + 1] = 0.3;
      col[i * 3 + 2] = 0.8;
    } else if (t > 0.85) {
      col[i * 3] = 0.7;
      col[i * 3 + 1] = 0.4;
      col[i * 3 + 2] = 1;
    } else {
      col[i * 3] = 0.3;
      col[i * 3 + 1] = 0.35;
      col[i * 3 + 2] = 0.8;
    }
  }

  geo.setAttribute("position", new THREE.BufferAttribute(pos, 3));
  geo.setAttribute("color", new THREE.BufferAttribute(col, 3));

  const mat = new THREE.PointsMaterial({
    size: 1.6,
    vertexColors: true,
    transparent: true,
    opacity: 0.75,
    sizeAttenuation: true,
    depthWrite: false,
  });

  particles = new THREE.Points(geo, mat);
  scene.add(particles);
}

// Glowing sphere (the purple orb)
function buildGlowSphere() {
  const geo = new THREE.SphereGeometry(110, 64, 64);
  const mat = new THREE.MeshBasicMaterial({
    color: 0x7700cc,
    transparent: true,
    opacity: 0,
  });

  const sphere = new THREE.Mesh(geo, mat);
  scene.add(sphere);

  const ringCount = 5000;
  const rGeo = new THREE.BufferGeometry();
  const rPos = new Float32Array(ringCount * 3);
  const rCol = new Float32Array(ringCount * 3);

  for (let i = 0; i < ringCount; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = 110 + (Math.random() - 0.5) * 10;
    rPos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
    rPos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
    rPos[i * 3 + 2] = r * Math.cos(phi);

    const bright = 0.7 + Math.random() * 0.3;
    rCol[i * 3] = bright * 0.75;
    rCol[i * 3 + 1] = bright * 0.2;
    rCol[i * 3 + 2] = bright;
  }

  rGeo.setAttribute("position", new THREE.BufferAttribute(rPos, 3));
  rGeo.setAttribute("color", new THREE.BufferAttribute(rCol, 3));

  const rMat = new THREE.PointsMaterial({
    size: 2.2,
    vertexColors: true,
    transparent: true,
    opacity: 0.9,
    sizeAttenuation: true,
    depthWrite: false,
  });

  scene.add(new THREE.Points(rGeo, rMat));
}

// Photo cards
function buildPhotoCards() {
  photos.forEach((p, i) => buildCard(p, i));
}

function buildCard(photo, index) {
  const cardSize = 38;
  const geo = new THREE.PlaneGeometry(cardSize, cardSize);

  let texture;
  if (photo.src) {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => {
      texture.image = img;
      texture.needsUpdate = true;
    };
    img.src = photo.src;
    texture = new THREE.Texture();
  } else {
    const pc = makePlaceholderCanvas(
      PLACEHOLDER_COLORS[index % PLACEHOLDER_COLORS.length],
      photo.caption || `#${index + 1}`
    );
    texture = new THREE.CanvasTexture(pc);
  }

  const mat = new THREE.MeshBasicMaterial({
    map: texture,
    transparent: true,
    side: THREE.DoubleSide,
  });

  const mesh = new THREE.Mesh(geo, mat);

  const normalizedIndex = index / Math.max(photos.length, 1);
  const angle = normalizedIndex * Math.PI * 2 + Math.random() * 0.35;
  const ringBand = index % 3;
  const radiusBase = [155, 210, 265][ringBand];
  const radius = radiusBase + (Math.random() - 0.5) * 55;
  const height = (Math.random() - 0.5) * 140;
  mesh.position.set(
    Math.cos(angle) * radius,
    height,
    Math.sin(angle) * radius
  );
  mesh.rotation.set(
    (Math.random() - 0.5) * 0.3,
    angle + Math.PI / 2,
    (Math.random() - 0.5) * 0.15
  );

  mesh.userData = { photo, index, originalPos: mesh.position.clone() };
  photoMeshes.push(mesh);
  scene.add(mesh);
}

function addLights() {
  scene.add(new THREE.AmbientLight(0x220033, 2));
  const pt = new THREE.PointLight(0x9933ff, 3, 500);
  pt.position.set(0, 0, 0);
  scene.add(pt);
}

// Animation loop
let clock = { t: 0 };
function animate() {
  requestAnimationFrame(animate);
  clock.t += 0.005;

  rotX += (targetRotX - rotX) * 0.05;
  rotY += (targetRotY - rotY) * 0.05;
  zoom += (targetZoom - zoom) * 0.07;

  scene.rotation.x = rotX;
  scene.rotation.y = rotY;

  camera.position.z = 500 / zoom;
  camera.lookAt(scene.position);

  particles.rotation.y = clock.t * 0.04;
  particles.rotation.x = Math.sin(clock.t * 0.015) * 0.05;

  photoMeshes.forEach((m, i) => {
    const op = m.userData.originalPos;
    m.position.y = op.y + Math.sin(clock.t * 0.6 + i * 0.9) * 4;
    m.rotation.z = Math.sin(clock.t * 0.4 + i) * 0.05;
  });

  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(photoMeshes);
  photoMeshes.forEach((m) => {
    m.scale.setScalar(1);
  });

  if (hits.length) {
    hits[0].object.scale.setScalar(1.1);
    document.body.style.cursor = isDragging ? "grabbing" : "pointer";
  } else {
    document.body.style.cursor = isDragging ? "grabbing" : "grab";
  }

  renderer.render(scene, camera);
}

// Events
function bindEvents() {
  const canvas = renderer.domElement;
  const addPanel = document.getElementById("add-panel");
  const fileInput = document.getElementById("file-input");
  const previewThumb = document.getElementById("preview-thumb");
  const captionInput = document.getElementById("caption-input");
  const errorBox = document.getElementById("add-error");
  const submitButton = document.getElementById("do-add");
  const submitButtonDefaultText = submitButton.textContent;

  ["gesturestart", "gesturechange", "gestureend"].forEach((eventName) => {
    document.addEventListener(eventName, (e) => {
      e.preventDefault();
    }, { passive: false });
  });

  canvas.addEventListener("mousedown", (e) => {
    isDragging = true;
    document.body.classList.add("grabbing");
    prevMouse = { x: e.clientX, y: e.clientY };
  });

  window.addEventListener("mouseup", () => {
    isDragging = false;
    document.body.classList.remove("grabbing");
  });

  canvas.addEventListener("mousemove", (e) => {
    mouse.x = (e.clientX / innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / innerHeight) * 2 + 1;
    if (!isDragging) return;

    const dx = e.clientX - prevMouse.x;
    const dy = e.clientY - prevMouse.y;
    targetRotY += dx * 0.005;
    targetRotX += dy * 0.005;
    prevMouse = { x: e.clientX, y: e.clientY };
  });

  let lastTouch = null;
  canvas.addEventListener("touchstart", (e) => {
    e.preventDefault();

    if (e.touches.length === 1) {
      lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    } else if (e.touches.length === 2) {
      lastTouch = {
        pinchDist: Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        ),
      };
    }
  }, { passive: false });

  canvas.addEventListener("touchmove", (e) => {
    e.preventDefault();

    if (e.touches.length === 1 && lastTouch) {
      const dx = e.touches[0].clientX - lastTouch.x;
      const dy = e.touches[0].clientY - lastTouch.y;
      targetRotY += dx * 0.006;
      targetRotX += dy * 0.006;
      lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }

    if (e.touches.length === 2) {
      const d = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );

      if (lastTouch && lastTouch.pinchDist) {
        targetZoom = clampZoom(targetZoom * (d / lastTouch.pinchDist));
      }

      lastTouch = { pinchDist: d };
    }
  }, { passive: false });

  canvas.addEventListener("touchend", () => {
    lastTouch = null;
  });

  canvas.addEventListener("touchcancel", () => {
    lastTouch = null;
  });

  canvas.addEventListener("wheel", (e) => {
    e.preventDefault();
    targetZoom = clampZoom(targetZoom * (e.deltaY < 0 ? 1.1 : 0.9));
  }, { passive: false });

  canvas.addEventListener("click", (e) => {
    mouse.x = (e.clientX / innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(photoMeshes);
    if (hits.length) openLightbox(hits[0].object.userData);
  });

  window.addEventListener("resize", () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  document.getElementById("zoom-in").onclick = () => {
    targetZoom = clampZoom(targetZoom * 1.3);
  };

  document.getElementById("zoom-out").onclick = () => {
    targetZoom = clampZoom(targetZoom * 0.75);
  };

  document.getElementById("reset-btn").onclick = () => {
    targetRotX = 0.3;
    targetRotY = 0;
    targetZoom = 1;
  };

  document.getElementById("add-photo-btn").onclick = () => {
    const willOpen = !addPanel.classList.contains("open");
    addPanel.classList.toggle("open");

    if (!willOpen) {
      resetAddPanel();
    }
  };

  fileInput.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (!file.type.startsWith("image/")) {
      resetAddPanel({ keepCaption: true });
      errorBox.textContent = "File harus berupa gambar.";
      return;
    }

    pendingUploadFile = file;
    const reader = new FileReader();
    reader.onload = (ev) => {
      previewThumb.src = ev.target.result;
      previewThumb.style.display = "block";
      previewThumb.dataset.src = ev.target.result;
      errorBox.textContent = "";
    };
    reader.readAsDataURL(file);
  };

  submitButton.onclick = async () => {
    if (!pendingUploadFile) {
      errorBox.textContent = "Pilih foto dulu.";
      return;
    }

    const caption = captionInput.value.trim() || `Photo ${photos.length + 1}`;
    const formData = new FormData();
    formData.append("file", pendingUploadFile);
    formData.append("caption", caption);

    submitButton.disabled = true;
    submitButton.textContent = "Uploading...";
    errorBox.textContent = "Menyimpan foto...";

    try {
      const response = await fetch("/api/photos", {
        method: "POST",
        body: formData,
      });

      const data = await response.json();
      if (!response.ok || !data.photo) {
        throw new Error(data.error || "Upload foto gagal.");
      }

      photos.push(data.photo);
      renderPhotos(photos);

      resetAddPanel();
      addPanel.classList.remove("open");
    } catch (error) {
      errorBox.textContent = error.message || "Upload foto gagal.";
    } finally {
      submitButton.disabled = false;
      submitButton.textContent = submitButtonDefaultText;
    }
  };

  document.getElementById("lightbox-close").onclick = closeLightbox;
  document.getElementById("lightbox").onclick = (e) => {
    if (e.target === document.getElementById("lightbox")) closeLightbox();
  };
}

function openLightbox({ photo }) {
  const lb = document.getElementById("lightbox");
  const img = document.getElementById("lightbox-img");
  const cap = document.getElementById("lightbox-caption");

  if (photo.src) {
    img.src = photo.src;
    img.style.display = "block";
  } else {
    const pc = makePlaceholderCanvas(
      PLACEHOLDER_COLORS[0],
      photo.caption || ""
    );
    img.src = pc.toDataURL();
    img.style.display = "block";
  }

  cap.textContent = photo.caption || "";
  lb.classList.add("open");
}

function closeLightbox() {
  document.getElementById("lightbox").classList.remove("open");
}
</script>
</body>
</html>
