<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Galaxy Photos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background:
        radial-gradient(circle at top, rgba(255, 102, 221, 0.08), transparent 28%),
        radial-gradient(circle at bottom, rgba(120, 80, 255, 0.12), transparent 34%),
        #020006;
      overflow: hidden;
      overscroll-behavior: none;
      font-family: "Georgia", serif;
      cursor: grab;
      user-select: none;
      touch-action: none;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(255, 255, 255, 0.03), transparent 52%),
        linear-gradient(180deg, rgba(0, 0, 0, 0.18), rgba(0, 0, 0, 0.42));
      pointer-events: none;
      z-index: 2;
    }

    body.grabbing { cursor: grabbing; }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      touch-action: none;
      filter: saturate(1.08) contrast(1.03);
    }

    #chrome {
      position: fixed;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      width: min(94vw, 560px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 120;
      pointer-events: none;
    }

    .chrome-pod {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
      color: rgba(255, 255, 255, 0.85);
      font-size: 11px;
      letter-spacing: 0.06em;
      backdrop-filter: blur(12px);
    }

    .chrome-pod.center {
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: none;
    }

    .chrome-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff62d2;
      box-shadow: 0 0 14px rgba(255, 98, 210, 0.75);
      flex: 0 0 auto;
    }

    /* UI Controls */
    #ui {
      position: fixed;
      top: 14px;
      right: 14px;
      display: flex;
      gap: 8px;
      z-index: 140;
      align-items: center;
    }

    .ctrl-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: rgba(255, 255, 255, 0.92);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s, border-color 0.2s;
      backdrop-filter: blur(14px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.28);
    }

    .ctrl-btn:hover {
      background: rgba(255, 255, 255, 0.16);
      border-color: rgba(255, 120, 225, 0.35);
      transform: translateY(-1px);
    }

    .ctrl-btn:active { transform: scale(0.95); }

    #hero-copy {
      position: fixed;
      top: 15vh;
      left: 50%;
      transform: translateX(-50%);
      z-index: 110;
      width: min(78vw, 620px);
      text-align: center;
      pointer-events: none;
      text-shadow: 0 10px 24px rgba(0, 0, 0, 0.55);
    }

    #hero-copy strong {
      display: block;
      margin-bottom: 8px;
      color: rgba(255, 255, 255, 0.97);
      font-family: "Brush Script MT", "Segoe Script", cursive;
      font-size: clamp(26px, 4.8vw, 46px);
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    #hero-copy span {
      color: rgba(235, 220, 255, 0.78);
      font-size: clamp(11px, 1.5vw, 13px);
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    /* Photo modal lightbox */
    #lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      backdrop-filter: blur(12px);
      animation: fadeIn 0.25s ease;
    }

    #lightbox.open { display: flex; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    #lightbox-inner {
      position: relative;
      max-width: 90vw;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    #lightbox-img {
      max-width: 80vw;
      max-height: 70vh;
      border-radius: 4px;
      box-shadow: 0 0 60px rgba(180, 100, 255, 0.5);
      object-fit: contain;
    }

    #lightbox-caption {
      color: #d0aaff;
      font-size: 14px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    #lightbox-close {
      position: absolute;
      top: -36px;
      right: 0;
      background: none;
      border: none;
      color: #888;
      font-size: 26px;
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s;
    }

    #lightbox-close:hover { color: #fff; }

    /* Top hint */
    #hint {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(233, 220, 255, 0.44);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      pointer-events: none;
      text-align: center;
      z-index: 120;
    }

    .floating-pink-dot {
      position: fixed;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #ff7fe1 0%, #ff45c8 55%, #b40f86 100%);
      box-shadow: 0 0 22px rgba(255, 76, 201, 0.55);
      pointer-events: none;
      z-index: 105;
    }

    .floating-pink-dot.dot-a {
      top: 22%;
      right: 22px;
      width: 16px;
      height: 16px;
    }

    .floating-pink-dot.dot-b {
      top: 58%;
      left: 24px;
      width: 10px;
      height: 10px;
      opacity: 0.85;
    }

    @media (max-width: 720px) {
      #chrome {
        width: calc(100vw - 72px);
      }

      .chrome-pod {
        min-height: 30px;
        padding: 0 10px;
        font-size: 10px;
      }

      #hero-copy {
        top: 17vh;
        width: calc(100vw - 40px);
      }

      #hint {
        width: calc(100vw - 40px);
        line-height: 1.5;
      }
    }
  </style>
</head>
<body>

<canvas id="c"></canvas>

<div id="chrome" aria-hidden="true">
  <div class="chrome-pod">
    <span class="chrome-dot"></span>
    <span>Love Planet</span>
  </div>
  <div class="chrome-pod center" id="chrome-domain">forirene.vercel.app</div>
</div>

<div id="hero-copy" aria-hidden="true">
  <strong>Only For You, Irene</strong>
  <span>A private galaxy of memories</span>
</div>

<span class="floating-pink-dot dot-a" aria-hidden="true"></span>
<span class="floating-pink-dot dot-b" aria-hidden="true"></span>

<div id="hint">Drag to rotate &nbsp;&middot;&nbsp; Scroll to zoom &nbsp;&middot;&nbsp; Click photo to open</div>

<div id="ui">
  <button class="ctrl-btn" id="zoom-out" title="Zoom out">−</button>
  <button class="ctrl-btn" id="zoom-in" title="Zoom in">+</button>
  <button class="ctrl-btn" id="reset-btn" title="Reset view">↻</button>
</div>

<div id="lightbox">
  <div id="lightbox-inner">
    <button id="lightbox-close">×</button>
    <img id="lightbox-img" src="" alt=""/>
    <div id="lightbox-caption"></div>
  </div>
</div>

<script>
// ===============================================
// GALAXY PHOTO UNIVERSE - Pure Three.js
// ===============================================

// Minimal Three.js via CDN import
const THREEJS_CDN = "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js";

function loadScript(src) {
  return new Promise((res, rej) => {
    const s = document.createElement("script");
    s.src = src;
    s.onload = res;
    s.onerror = rej;
    document.head.appendChild(s);
  });
}

loadScript(THREEJS_CDN).then(init);

const PHOTO_SLOT_COUNT = 24;
const BLUR_OBJECT_COUNT = 18;
const LOCAL_PHOTO_FILES = [
  "image 1.png",
  "image 10.png",
  "image 11.png",
  "image 12.png",
  "image 13.png",
  "image 2.png",
  "image 3.png",
  "image 4.png",
  "image 5.png",
  "image 6.png",
  "image 7.png",
  "image 8.png",
  "image 9.png",
];

const SAMPLE_PHOTOS = Array.from({ length: PHOTO_SLOT_COUNT }, (_, index) => ({
  src: null,
  caption: `Memory ${index + 1}`,
}));

const PLACEHOLDER_COLORS = [
  "#c084fc", "#f472b6", "#818cf8", "#34d399",
  "#fb923c", "#38bdf8", "#a78bfa", "#f9a8d4"
];

function makePlaceholderCanvas(color, label) {
  const c = document.createElement("canvas");
  c.width = 256;
  c.height = 256;
  const ctx = c.getContext("2d");

  const g = ctx.createLinearGradient(0, 0, 256, 256);
  g.addColorStop(0, `${color}aa`);
  g.addColorStop(1, "#1a0a2e");
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, 256, 256);

  ctx.strokeStyle = color;
  ctx.lineWidth = 6;
  ctx.strokeRect(4, 4, 248, 248);

  ctx.fillStyle = "#ffffffcc";
  ctx.font = "bold 22px Georgia";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(label, 128, 128);
  return c;
}

function normalizeCaption(value, fallback) {
  const clean = (value || "").trim();
  return clean || fallback;
}

function formatCaptionFromFilename(fileName) {
  return fileName
    .replace(/\.[^.]+$/, "")
    .replace(/[-_]+/g, " ")
    .replace(/\s+/g, " ")
    .trim()
    .replace(/\b\w/g, (char) => char.toUpperCase());
}

function localPhotoUrl(fileName) {
  return `/foto.png/${encodeURIComponent(fileName)}`;
}

function buildLocalPhotos(fileNames) {
  return fileNames.map((fileName, index) => ({
    id: `local-${index}`,
    src: localPhotoUrl(fileName),
    caption: normalizeCaption(
      formatCaptionFromFilename(fileName),
      `Memory ${index + 1}`
    ),
    storage_path: fileName,
    isLocal: true,
  }));
}

function getSourcePhotoKey(photo) {
  if (photo?.id !== undefined && photo?.id !== null) {
    return `id:${photo.id}`;
  }

  if (photo?.storage_path) {
    return `path:${photo.storage_path}`;
  }

  if (photo?.src) {
    return `src:${photo.src}`;
  }

  return `caption:${photo?.caption || "memory"}`;
}

function normalizeSourcePhoto(photo, index = 0) {
  return {
    ...photo,
    caption: normalizeCaption(photo?.caption, `Memory ${index + 1}`),
  };
}

function mergePhotoSources(...groups) {
  const merged = new Map();

  groups.flat().forEach((photo, index) => {
    if (!photo) {
      return;
    }

    const normalized = normalizeSourcePhoto(photo, index);
    const key = getSourcePhotoKey(normalized);

    if (!merged.has(key)) {
      merged.set(key, normalized);
    }
  });

  return [...merged.values()];
}

function buildDisplayPhotos(sourcePhotos) {
  if (!sourcePhotos.length) {
    return [...SAMPLE_PHOTOS];
  }

  const slotCount = Math.max(PHOTO_SLOT_COUNT, sourcePhotos.length);

  return Array.from({ length: slotCount }, (_, slotIndex) => {
    const basePhoto = sourcePhotos[slotIndex % sourcePhotos.length];

    return {
      ...basePhoto,
      slotId: `${getSourcePhotoKey(basePhoto)}:slot:${slotIndex}`,
      slotIndex,
      isClone: slotIndex >= sourcePhotos.length,
    };
  });
}

function drawCoverImage(ctx, source, width, height, zoom = 1) {
  const sourceWidth = source.width || 1;
  const sourceHeight = source.height || 1;
  const scale = Math.max(width / sourceWidth, height / sourceHeight) * zoom;
  const drawWidth = sourceWidth * scale;
  const drawHeight = sourceHeight * scale;
  const drawX = (width - drawWidth) / 2;
  const drawY = (height - drawHeight) / 2;

  ctx.drawImage(source, drawX, drawY, drawWidth, drawHeight);
}

function drawTextureCanvas(canvas, source, { blurred = false } = {}) {
  const ctx = canvas.getContext("2d");
  const { width, height } = canvas;

  ctx.clearRect(0, 0, width, height);
  ctx.fillStyle = "#070111";
  ctx.fillRect(0, 0, width, height);

  if (blurred) {
    ctx.save();
    ctx.filter = "blur(12px) saturate(1.15)";
    ctx.globalAlpha = 0.9;
    drawCoverImage(ctx, source, width, height, 1.24);
    ctx.restore();

    const glow = ctx.createRadialGradient(
      width / 2,
      height / 2,
      width * 0.08,
      width / 2,
      height / 2,
      width * 0.68
    );
    glow.addColorStop(0, "rgba(255, 255, 255, 0.16)");
    glow.addColorStop(0.55, "rgba(181, 114, 255, 0.12)");
    glow.addColorStop(1, "rgba(7, 1, 17, 0)");

    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, width, height);
    return;
  }

  drawCoverImage(ctx, source, width, height, 1.04);
  ctx.strokeStyle = "rgba(255, 255, 255, 0.18)";
  ctx.lineWidth = 4;
  ctx.strokeRect(2, 2, width - 4, height - 4);
}

function createPhotoTexture(photo, index, { blurred = false } = {}) {
  if (!photo.src) {
    const placeholder = makePlaceholderCanvas(
      PLACEHOLDER_COLORS[index % PLACEHOLDER_COLORS.length],
      photo.caption || `#${index + 1}`
    );

    if (!blurred) {
      return new THREE.CanvasTexture(placeholder);
    }

    const blurredCanvas = document.createElement("canvas");
    blurredCanvas.width = 160;
    blurredCanvas.height = 160;
    drawTextureCanvas(blurredCanvas, placeholder, { blurred: true });
    return new THREE.CanvasTexture(blurredCanvas);
  }

  const textureCanvas = document.createElement("canvas");
  textureCanvas.width = blurred ? 160 : 256;
  textureCanvas.height = blurred ? 160 : 256;
  const texture = new THREE.CanvasTexture(textureCanvas);
  const image = new Image();
  image.crossOrigin = "anonymous";
  image.onload = () => {
    drawTextureCanvas(textureCanvas, image, { blurred });
    texture.needsUpdate = true;
  };
  image.onerror = () => {
    const fallbackCanvas = makePlaceholderCanvas(
      PLACEHOLDER_COLORS[index % PLACEHOLDER_COLORS.length],
      photo.caption || `#${index + 1}`
    );
    drawTextureCanvas(textureCanvas, fallbackCanvas, { blurred });
    texture.needsUpdate = true;
  };
  image.src = photo.src;

  return texture;
}

const LOCAL_PHOTOS = buildLocalPhotos(LOCAL_PHOTO_FILES);

// State
let scene, camera, renderer, raycaster, mouse;
let particles, photoMeshes = [], accentMeshes = [];
let isDragging = false;
let prevMouse = { x: 0, y: 0 };
let rotX = 0.3;
let rotY = 0;
let targetRotX = 0.3;
let targetRotY = 0;
let zoom = 1;
let targetZoom = 1;
let photoLibrary = mergePhotoSources(LOCAL_PHOTOS);
let photos = buildDisplayPhotos(photoLibrary);
const MIN_ZOOM = 0.55;
const MAX_ZOOM = 3;

function init() {
  const canvas = document.getElementById("c");
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x020008);
  scene.fog = new THREE.FogExp2(0x020008, 0.0015);

  camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 3000);
  camera.position.set(0, 0, 500);

  raycaster = new THREE.Raycaster();
  mouse = new THREE.Vector2(-9999, -9999);

  buildParticles();
  buildGlowSphere();
  buildPhotoCards();
  buildBlurCards();
  addLights();
  animate();
  bindEvents();
  loadStoredPhotos();
  connectSSE();
  const chromeDomain = document.getElementById("chrome-domain");
  if (chromeDomain) {
    chromeDomain.textContent = location.host || "forirene.vercel.app";
  }
}

function clampZoom(nextZoom) {
  return Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, nextZoom));
}

function disposeMesh(mesh) {
  scene.remove(mesh);
  mesh.traverse((node) => {
    if (node.geometry) {
      node.geometry.dispose();
    }

    const materials = Array.isArray(node.material) ? node.material : [node.material];
    materials.filter(Boolean).forEach((material) => {
      if (material.map) {
        material.map.dispose();
      }

      material.dispose();
    });
  });
}

function clearPhotoCards() {
  [...photoMeshes, ...accentMeshes].forEach((mesh) => {
    disposeMesh(mesh);
  });

  photoMeshes = [];
  accentMeshes = [];
}

function renderPhotos(nextPhotos) {
  photoLibrary = nextPhotos.length ? mergePhotoSources(nextPhotos) : [];
  photos = buildDisplayPhotos(photoLibrary);
  clearPhotoCards();
  buildPhotoCards();
  buildBlurCards();
}

async function loadStoredPhotos() {
  try {
    const response = await fetch("/api/photos");
    if (!response.ok) {
      throw new Error("Request daftar foto gagal.");
    }

    const data = await response.json();
    const storedPhotos = Array.isArray(data.photos) ? data.photos : [];
    renderPhotos(mergePhotoSources(LOCAL_PHOTOS, storedPhotos));
  } catch (error) {
    renderPhotos(LOCAL_PHOTOS);
  }
}

let eventSource = null;

function connectSSE() {
  if (eventSource) {
    eventSource.close();
  }

  eventSource = new EventSource('/api/sse');

  eventSource.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);
      if (data.type === 'new_photo') {
        // Prepend new photo if not already in list (avoid dupes)
        if (!photoLibrary.find((photo) => getSourcePhotoKey(photo) === getSourcePhotoKey(data.photo))) {
          renderPhotos([data.photo, ...photoLibrary]);
        }
      } else if (data.type === 'recent_photos') {
        // Merge recent photos
        renderPhotos(mergePhotoSources(photoLibrary, data.photos));
      } else if (data.type === 'error') {
        console.error('SSE error:', data.message);
      }
    } catch (err) {
      console.error('SSE parse error:', err);
    }
  };

  eventSource.onerror = () => {
    console.log('SSE reconnecting...');
    setTimeout(connectSSE, 3000);
  };

  eventSource.onopen = () => {
    console.log('SSE connected');
  };
}


// Particle field
function buildParticles() {
  const count = 18000;
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  const col = new Float32Array(count * 3);

  for (let i = 0; i < count; i++) {
    const r = Math.random() * 900 + 50;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    pos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
    pos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta) * 0.45;
    pos[i * 3 + 2] = r * Math.cos(phi);

    const t = Math.random();
    if (t > 0.97) {
      col[i * 3] = 1;
      col[i * 3 + 1] = 0.3;
      col[i * 3 + 2] = 0.8;
    } else if (t > 0.85) {
      col[i * 3] = 0.7;
      col[i * 3 + 1] = 0.4;
      col[i * 3 + 2] = 1;
    } else {
      col[i * 3] = 0.3;
      col[i * 3 + 1] = 0.35;
      col[i * 3 + 2] = 0.8;
    }
  }

  geo.setAttribute("position", new THREE.BufferAttribute(pos, 3));
  geo.setAttribute("color", new THREE.BufferAttribute(col, 3));

  const mat = new THREE.PointsMaterial({
    size: 1.6,
    vertexColors: true,
    transparent: true,
    opacity: 0.75,
    sizeAttenuation: true,
    depthWrite: false,
  });

  particles = new THREE.Points(geo, mat);
  scene.add(particles);
}

// Glowing sphere (the purple orb)
function buildGlowSphere() {
  const geo = new THREE.SphereGeometry(110, 64, 64);
  const mat = new THREE.MeshBasicMaterial({
    color: 0x7700cc,
    transparent: true,
    opacity: 0,
  });

  const sphere = new THREE.Mesh(geo, mat);
  scene.add(sphere);

  const ringCount = 5000;
  const rGeo = new THREE.BufferGeometry();
  const rPos = new Float32Array(ringCount * 3);
  const rCol = new Float32Array(ringCount * 3);

  for (let i = 0; i < ringCount; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = 110 + (Math.random() - 0.5) * 10;
    rPos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
    rPos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
    rPos[i * 3 + 2] = r * Math.cos(phi);

    const bright = 0.7 + Math.random() * 0.3;
    rCol[i * 3] = bright * 0.75;
    rCol[i * 3 + 1] = bright * 0.2;
    rCol[i * 3 + 2] = bright;
  }

  rGeo.setAttribute("position", new THREE.BufferAttribute(rPos, 3));
  rGeo.setAttribute("color", new THREE.BufferAttribute(rCol, 3));

  const rMat = new THREE.PointsMaterial({
    size: 2.2,
    vertexColors: true,
    transparent: true,
    opacity: 0.9,
    sizeAttenuation: true,
    depthWrite: false,
  });

  scene.add(new THREE.Points(rGeo, rMat));
}

// Photo cards
function buildPhotoCards() {
  photos.forEach((p, i) => buildCard(p, i));
}

function buildCard(photo, index) {
  const cardWidth = 52;
  const cardHeight = 52;
  const geo = new THREE.PlaneGeometry(cardWidth, cardHeight);
  const texture = createPhotoTexture(photo, index);

  const mat = new THREE.MeshBasicMaterial({
    map: texture,
    transparent: false,
    opacity: 1,
    side: THREE.DoubleSide,
    toneMapped: false,
  });

  const mesh = new THREE.Mesh(geo, mat);
  const backPlate = new THREE.Mesh(
    new THREE.PlaneGeometry(cardWidth + 5, cardHeight + 5),
    new THREE.MeshBasicMaterial({
      color: 0x120417,
      transparent: true,
      opacity: 0.96,
      side: THREE.DoubleSide,
    })
  );
  backPlate.position.z = -1.2;
  mesh.add(backPlate);

  const normalizedIndex = index / Math.max(photos.length, 1);
  const angle = normalizedIndex * Math.PI * 2 + Math.random() * 0.35;
  const ringBand = index % 3;
  const radiusBase = [155, 210, 265][ringBand];
  const radius = radiusBase + (Math.random() - 0.5) * 55;
  const height = (Math.random() - 0.5) * 140;
  mesh.position.set(
    Math.cos(angle) * radius,
    height,
    Math.sin(angle) * radius
  );
  mesh.rotation.set(
    (Math.random() - 0.5) * 0.3,
    angle + Math.PI / 2,
    (Math.random() - 0.5) * 0.15
  );

  mesh.renderOrder = 2;
  mesh.userData = { photo, index, originalPos: mesh.position.clone() };
  photoMeshes.push(mesh);
  scene.add(mesh);
}

function buildBlurCards() {
  const accentCount = Math.min(BLUR_OBJECT_COUNT, photos.length);

  for (let index = 0; index < accentCount; index += 1) {
    const photo = photos[index % photos.length];
    const size = 12 + Math.random() * 8;
    const geo = new THREE.PlaneGeometry(size, size * (0.86 + Math.random() * 0.28));
    const texture = createPhotoTexture(photo, index, { blurred: true });
    const material = new THREE.MeshBasicMaterial({
      map: texture,
      transparent: true,
      opacity: 0.16 + Math.random() * 0.08,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
      side: THREE.DoubleSide,
    });
    const mesh = new THREE.Mesh(geo, material);
    const normalizedIndex = index / Math.max(accentCount, 1);
    const angle = normalizedIndex * Math.PI * 2 + Math.random() * 0.7;
    const radiusBase = [120, 176, 232, 310][index % 4];
    const radius = radiusBase + (Math.random() - 0.5) * 34;
    const height = (Math.random() - 0.5) * 210;

    mesh.position.set(
      Math.cos(angle) * radius,
      height,
      Math.sin(angle) * radius
    );
    mesh.rotation.set(
      (Math.random() - 0.5) * 0.55,
      angle + Math.PI / 2,
      (Math.random() - 0.5) * 0.5
    );
    mesh.scale.setScalar(1.04 + Math.random() * 0.28);
    mesh.renderOrder = 1;
    mesh.userData = {
      originalPos: mesh.position.clone(),
      floatRange: 2 + Math.random() * 4,
      pulseOffset: Math.random() * Math.PI * 2,
      rotationSpeed: (Math.random() - 0.5) * 0.01,
      baseScale: mesh.scale.x,
    };
    accentMeshes.push(mesh);
    scene.add(mesh);
  }
}

function addLights() {
  scene.add(new THREE.AmbientLight(0x220033, 2));
  const pt = new THREE.PointLight(0x9933ff, 3, 500);
  pt.position.set(0, 0, 0);
  scene.add(pt);
}

// Animation loop
let clock = { t: 0 };
function animate() {
  requestAnimationFrame(animate);
  clock.t += 0.005;

  rotX += (targetRotX - rotX) * 0.05;
  rotY += (targetRotY - rotY) * 0.05;
  zoom += (targetZoom - zoom) * 0.07;

  scene.rotation.x = rotX;
  scene.rotation.y = rotY;

  camera.position.z = 500 / zoom;
  camera.lookAt(scene.position);

  particles.rotation.y = clock.t * 0.04;
  particles.rotation.x = Math.sin(clock.t * 0.015) * 0.05;

  photoMeshes.forEach((m, i) => {
    const op = m.userData.originalPos;
    m.position.y = op.y + Math.sin(clock.t * 0.6 + i * 0.9) * 4;
    m.rotation.z = Math.sin(clock.t * 0.4 + i) * 0.05;
  });

  accentMeshes.forEach((m, i) => {
    const op = m.userData.originalPos;
    const floatRange = m.userData.floatRange;
    m.position.x = op.x + Math.cos(clock.t * 0.45 + i) * floatRange;
    m.position.y = op.y + Math.sin(clock.t * 0.8 + i * 1.4) * (floatRange * 1.25);
    m.position.z = op.z + Math.cos(clock.t * 0.52 + i * 0.8) * floatRange;
    m.scale.setScalar(
      m.userData.baseScale + Math.sin(clock.t + m.userData.pulseOffset) * 0.08
    );
    m.rotation.z += m.userData.rotationSpeed;
  });

  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(photoMeshes);
  photoMeshes.forEach((m) => {
    m.scale.setScalar(1);
  });

  if (hits.length) {
    hits[0].object.scale.setScalar(1.1);
    document.body.style.cursor = isDragging ? "grabbing" : "pointer";
  } else {
    document.body.style.cursor = isDragging ? "grabbing" : "grab";
  }

  renderer.render(scene, camera);
}

// Events
function bindEvents() {
  const canvas = renderer.domElement;

  ["gesturestart", "gesturechange", "gestureend"].forEach((eventName) => {
    document.addEventListener(eventName, (e) => {
      e.preventDefault();
    }, { passive: false });
  });

  canvas.addEventListener("mousedown", (e) => {
    isDragging = true;
    document.body.classList.add("grabbing");
    prevMouse = { x: e.clientX, y: e.clientY };
  });

  window.addEventListener("mouseup", () => {
    isDragging = false;
    document.body.classList.remove("grabbing");
  });

  canvas.addEventListener("mousemove", (e) => {
    mouse.x = (e.clientX / innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / innerHeight) * 2 + 1;
    if (!isDragging) return;

    const dx = e.clientX - prevMouse.x;
    const dy = e.clientY - prevMouse.y;
    targetRotY += dx * 0.005;
    targetRotX += dy * 0.005;
    prevMouse = { x: e.clientX, y: e.clientY };
  });

  let lastTouch = null;
  canvas.addEventListener("touchstart", (e) => {
    e.preventDefault();

    if (e.touches.length === 1) {
      lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    } else if (e.touches.length === 2) {
      lastTouch = {
        pinchDist: Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        ),
      };
    }
  }, { passive: false });

  canvas.addEventListener("touchmove", (e) => {
    e.preventDefault();

    if (e.touches.length === 1 && lastTouch) {
      const dx = e.touches[0].clientX - lastTouch.x;
      const dy = e.touches[0].clientY - lastTouch.y;
      targetRotY += dx * 0.006;
      targetRotX += dy * 0.006;
      lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }

    if (e.touches.length === 2) {
      const d = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );

      if (lastTouch && lastTouch.pinchDist) {
        targetZoom = clampZoom(targetZoom * (d / lastTouch.pinchDist));
      }

      lastTouch = { pinchDist: d };
    }
  }, { passive: false });

  canvas.addEventListener("touchend", () => {
    lastTouch = null;
  });

  canvas.addEventListener("touchcancel", () => {
    lastTouch = null;
  });

  canvas.addEventListener("wheel", (e) => {
    e.preventDefault();
    targetZoom = clampZoom(targetZoom * (e.deltaY < 0 ? 1.1 : 0.9));
  }, { passive: false });

  canvas.addEventListener("click", (e) => {
    mouse.x = (e.clientX / innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(photoMeshes);
    if (hits.length) openLightbox(hits[0].object.userData);
  });

  window.addEventListener("resize", () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  document.getElementById("zoom-in").onclick = () => {
    targetZoom = clampZoom(targetZoom * 1.3);
  };

  document.getElementById("zoom-out").onclick = () => {
    targetZoom = clampZoom(targetZoom * 0.75);
  };

  document.getElementById("reset-btn").onclick = () => {
    targetRotX = 0.3;
    targetRotY = 0;
    targetZoom = 1;
  };

  document.getElementById("lightbox-close").onclick = closeLightbox;
  document.getElementById("lightbox").onclick = (e) => {
    if (e.target === document.getElementById("lightbox")) closeLightbox();
  };
}

function openLightbox({ photo }) {
  const lb = document.getElementById("lightbox");
  const img = document.getElementById("lightbox-img");
  const cap = document.getElementById("lightbox-caption");

  if (photo.src) {
    img.src = photo.src;
    img.style.display = "block";
  } else {
    const pc = makePlaceholderCanvas(
      PLACEHOLDER_COLORS[0],
      photo.caption || ""
    );
    img.src = pc.toDataURL();
    img.style.display = "block";
  }

  cap.textContent = photo.caption || "";
  lb.classList.add("open");
}

function closeLightbox() {
  document.getElementById("lightbox").classList.remove("open");
}
</script>
