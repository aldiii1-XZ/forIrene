<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Love Planet</title>
  <meta
    name="description"
    content="Loading page bertema space sebelum masuk ke galaxy photo universe."
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-loading">
  <div class="space-backdrop" aria-hidden="true">
    <div class="nebula nebula-left"></div>
    <div class="nebula nebula-right"></div>
    <div class="stars" id="stars"></div>
  </div>

  <main class="loading-shell">
    <section class="loading-card reveal">
      <div class="loading-planet-icon" aria-hidden="true">🪐</div>

      <div class="love-planet">
        <span class="love-planet-ring"></span>
        <span class="love-planet-core"></span>
      </div>

      <h1>Love Planet</h1>
      <p class="loading-copy">A world shaped with love, just for you...</p>
      <p class="loading-wait">Just a moment <span class="loading-dot">✦</span></p>

      <div class="loading-progress" aria-hidden="true">
        <span class="loading-progress-bar"></span>
      </div>

      <a class="button button-solid loading-enter" href="/galaxy">Enter Galaxy</a>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
